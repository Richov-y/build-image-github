name: Build and Push Image
on: [push]

permissions:
  contents: read
  packages: write

jobs:
  build-push-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t imageku .

      - name: Login to GitHub Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u richov-y --password-stdin

      - name: Tag image
        run: docker tag imageku ghcr.io/richov-y/imageku:latest

      - name: Push image
        run: docker push ghcr.io/richov-y/imageku:latest
